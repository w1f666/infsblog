name: 部署 Astro 到 GitHub Pages

on:
  # 只有当 main 分支有代码推送时才触发
  push:
    branches: [main]

# 授予该流水线写入权限（部署需要写入一个新的分支）
permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: 'npm' # 开启缓存，让下次部署更快

      - name: 📦 安装依赖
        run: npm install

      - name: 🔨 编译项目 (生成 dist 文件夹)
        run: npm run build

      - name: 🚀 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist # 核心：只发布打包后的资源